<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BluQuest</title>
<meta name="description" content="Cook to befriend Blupets, send a team of three on expeditions across Tumble Isles, and grow them into their final forms. A whimsical fan-made quest." />
<meta property="og:title" content="BluQuest" />
<meta property="og:description" content="Befriend Blupets, explore the isles, evolve your team. A cozy fan-made adventure." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --sky1:#bfe2ff; --sky2:#eaf6ff; --sky3:#fef6e9; --cream:#fffdf5; --cream2:#fff7e6;
    --dsky1:#aee0ff; --dsky2:#cdeeff; --dground:#bfe89a; --sun-glow:#ffe48a; --cloud:#fff; --cloud-op:.8;
    --ink:#27406e; --ink2:#5a6e9a; --line:#27406e;
    --blu:#3a8bf0; --cyan:#2cc0d2; --sun:#ffc928; --coral:#ff7a6b; --mint:#56cf8c; --grape:#a87be8;
    --shadow:#27406e;
    --px:'Press Start 2P', monospace; --body:'Quicksand', system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--body); color:var(--ink);
    background:linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 55%, var(--sky3) 100%);
    background-attachment:fixed; overflow-x:hidden; transition:background .8s ease;
  }
  img{image-rendering:pixelated; display:block}
  /* floating pixel clouds */
  .clouds{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .cloud{position:absolute;width:64px;height:24px;background:
     radial-gradient(circle at 30% 60%, var(--cloud) 0 12px, transparent 13px),
     radial-gradient(circle at 60% 50%, var(--cloud) 0 16px, transparent 17px),
     radial-gradient(circle at 80% 65%, var(--cloud) 0 10px, transparent 11px);
     opacity:var(--cloud-op); animation:drift linear infinite; transition:opacity .8s ease}
  @keyframes drift{from{transform:translateX(-90px)}to{transform:translateX(110vw)}}
  @media (prefers-reduced-motion:reduce){.cloud{animation:none;opacity:.5}}

  #shell{position:relative;z-index:1;max-width:460px;margin:0 auto;min-height:100%;
    display:flex;flex-direction:column;padding-bottom:78px}

  /* top status bar */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;
    padding:10px 12px;background:rgba(255,253,245,.85);backdrop-filter:blur(6px);
    border-bottom:3px solid var(--line)}
  .brand{font-family:var(--px);font-size:12px;color:var(--blu);letter-spacing:.5px;
    text-shadow:1px 1px 0 #fff, 2px 2px 0 #bcd6f5}
  .brand b{color:var(--coral)}
  .stat{margin-left:auto;display:flex;gap:6px}
  .chip{display:flex;align-items:center;gap:4px;font-family:var(--px);font-size:9px;
    background:var(--cream);border:2px solid var(--line);border-radius:10px;padding:5px 7px;
    box-shadow:2px 2px 0 var(--shadow)}
  .chip .ic{font-size:12px}

  .view{flex:1;padding:14px 14px 6px;animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.title{font-family:var(--px);font-size:14px;margin:2px 0 2px;color:var(--ink)}
  .sub{font-size:14px;color:var(--ink2);margin:0 0 14px;font-weight:600}

  .card{background:var(--cream);border:3px solid var(--line);border-radius:16px;
    box-shadow:4px 4px 0 var(--shadow);padding:14px;margin-bottom:14px}
  .card.tint{background:var(--cream2)}

  .btn{font-family:var(--px);font-size:10px;border:3px solid var(--line);border-radius:12px;
    background:var(--sun);color:var(--ink);padding:12px 14px;cursor:pointer;
    box-shadow:3px 3px 0 var(--shadow);transition:transform .06s, box-shadow .06s;width:100%}
  .btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--shadow)}
  .btn.blu{background:var(--blu);color:#fff}
  .btn.cyan{background:var(--cyan);color:#06343a}
  .btn.mint{background:var(--mint);color:#06351d}
  .btn.coral{background:var(--coral);color:#fff}
  .btn.ghost{background:var(--cream);}
  .btn[disabled]{filter:grayscale(.6);opacity:.55;cursor:not-allowed;
    box-shadow:3px 3px 0 var(--shadow)}
  .btn[disabled]:active{transform:none;box-shadow:3px 3px 0 var(--shadow)}
  .btn.sm{font-size:8px;padding:8px 9px;width:auto;border-radius:10px;box-shadow:2px 2px 0 var(--shadow)}
  .btn.sm:active{transform:translate(2px,2px)}

  /* camp diorama */
  .diorama{position:relative;border:3px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:4px 4px 0 var(--shadow);
    background:linear-gradient(180deg,var(--dsky1) 0 40%, var(--dsky2) 40% 58%, var(--dground) 58% 100%);height:220px;margin-bottom:14px;transition:background .8s ease}
  .stars{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;pointer-events:none;
    background-image:
      radial-gradient(1.5px 1.5px at 18% 22%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 58% 14%, #fff, transparent),
      radial-gradient(1px 1px at 80% 28%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 34% 36%, #fff, transparent),
      radial-gradient(1px 1px at 72% 44%, #fff, transparent),
      radial-gradient(1px 1px at 12% 48%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 90% 18%, #fff, transparent),
      radial-gradient(1px 1px at 46% 26%, #fff, transparent)}
  body.night .stars{opacity:.92}
  .sun{position:absolute;top:14px;right:18px;width:34px;height:34px;border-radius:50%;
    background:var(--sun);box-shadow:0 0 16px 5px var(--sun-glow), 3px 3px 0 #0001;transition:background .8s ease,box-shadow .8s ease}
  body.night .ledge{background:repeating-linear-gradient(90deg,#4f6b46 0 16px,#46613d 16px 32px)}
  body.night .sun{box-shadow:0 0 16px 5px var(--sun-glow), inset -8px -3px 0 #b9c4e6}
  .ledge{position:absolute;bottom:0;left:0;right:0;height:42%;
    background:repeating-linear-gradient(90deg,#bfe89a 0 16px,#b6e28f 16px 32px)}
  .party-stage{position:absolute;bottom:8%;left:0;right:0;display:flex;justify-content:center;
    align-items:flex-end;gap:10px;padding:0 10px;pointer-events:none}
  .party-stage .petpet,.party-stage .empty-slot{pointer-events:auto}
  .cook-timer{position:absolute;left:6px;bottom:20%;z-index:5;font-family:var(--px);font-size:8px;
    color:var(--ink);background:var(--cream);border:2px solid var(--line);border-radius:7px;
    padding:3px 5px;box-shadow:2px 2px 0 var(--shadow);white-space:nowrap}
  .pot-big.cooking{animation:potwiggle 1.1s ease-in-out infinite}
  @keyframes potwiggle{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
  .pot{position:absolute;bottom:8%;left:12px;width:40px;height:30px;background:#6b6e7e;
    border:3px solid var(--line);border-radius:6px 6px 10px 10px}
  .pot:before{content:"";position:absolute;top:-9px;left:-4px;right:-4px;height:8px;
    background:#8a8ea0;border:3px solid var(--line);border-radius:6px}
  .bubl{position:absolute;top:-16px;left:8px;width:8px;height:8px;border-radius:50%;
    background:#fff;opacity:.8;animation:rise 1.6s infinite}
  @keyframes rise{from{transform:translateY(6px);opacity:.1}50%{opacity:.9}to{transform:translateY(-10px);opacity:0}}

  .petbob{animation:bob 2.4s ease-in-out infinite}
  .petbob:nth-child(2){animation-delay:.3s}.petbob:nth-child(3){animation-delay:.6s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @media (prefers-reduced-motion:reduce){.petbob,.bubl,.pot,.tapring{animation:none}}
  .petpet{cursor:pointer;transition:transform .1s}
  .petpet:active{transform:scale(.94)}
  .petsquish{animation:squish .38s ease}
  @keyframes squish{0%{transform:scale(1)}28%{transform:scale(1.13,.88)}55%{transform:scale(.95,1.07)}100%{transform:scale(1)}}
  .pot{cursor:pointer}
  .pot:active{transform:translateY(1px)}
  .tapring{position:absolute;bottom:7%;left:8px;width:50px;height:50px;border-radius:50%;
    border:2px solid #ffffffaa;pointer-events:none;animation:tapr 2.2s ease-out infinite}
  @keyframes tapr{0%{transform:scale(.5);opacity:.7}100%{transform:scale(1.4);opacity:0}}
  .pot-cap{position:absolute;bottom:1%;left:2px;font-size:9px;font-family:var(--px);color:#445;
    background:#ffffffcc;border:2px solid var(--line);border-radius:6px;padding:2px 4px}
  .heartpop{position:fixed;z-index:90;pointer-events:none;font-size:20px;
    animation:heartfly 1s ease-out forwards;text-shadow:0 0 5px #fff8}
  @keyframes heartfly{0%{opacity:0;transform:translate(-50%,4px) scale(.4)}
    25%{opacity:1;transform:translate(-50%,-6px) scale(1.15)}
    100%{opacity:0;transform:translate(-50%,-40px) scale(.9) rotate(8deg)}}
  .decor{position:absolute;z-index:2;cursor:grab;touch-action:none;transform:translate(-50%,-50%);
    filter:drop-shadow(1px 1px 0 #0002)}
  .decor svg{display:block;pointer-events:none}
  .decor.dragging{animation:none;z-index:6;cursor:grabbing;filter:drop-shadow(2px 3px 0 #0003)}
  @keyframes decorbob{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,calc(-50% - 3px))}}
  .idle-hop{animation:idlehop .6s ease}
  @keyframes idlehop{0%,100%{transform:translateY(0)}40%{transform:translateY(-11px)}70%{transform:translateY(0)}}
  .idle-wiggle{animation:idlewig .6s ease}
  @keyframes idlewig{0%,100%{transform:rotate(0)}25%{transform:rotate(-7deg)}75%{transform:rotate(7deg)}}
  @media (prefers-reduced-motion:reduce){.decor,.idle-hop,.idle-wiggle,.idle-wander,.firefly,.leaf,.shootstar{animation:none}}
  .idle-wander{animation:idlewander 1.6s ease-in-out}
  @keyframes idlewander{0%{transform:translateX(0)}30%{transform:translateX(-14px)}70%{transform:translateX(12px)}100%{transform:translateX(0)}}
  /* daily gift */
  .gift{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);z-index:4;cursor:pointer;
    filter:drop-shadow(0 0 7px #ffd24a);animation:giftbob 1.3s ease-in-out infinite}
  .gift svg{pointer-events:none}
  @keyframes giftbob{0%,100%{transform:translate(-50%,-50%) translateY(0) rotate(-3deg)}50%{transform:translate(-50%,-50%) translateY(-5px) rotate(3deg)}}
  /* merchant */
  .merchant{position:absolute;right:6%;bottom:30%;z-index:4;cursor:pointer;filter:drop-shadow(2px 2px 0 #0002);animation:decorbob 2.6s ease-in-out infinite}
  .merchant svg{pointer-events:none}
  .merch-pop{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-family:var(--px);font-size:12px;color:#fff;
    background:var(--coral);border:2px solid #fff;border-radius:8px;padding:0 5px;animation:giftbob 1s ease-in-out infinite}
  /* pet chat/nap bubble */
  .chatbub{position:fixed;transform:translate(-50%,-100%);font-size:15px;background:#fff;border:2px solid var(--line);
    border-radius:9px;padding:1px 6px;pointer-events:none;z-index:60;animation:chatfloat 1.7s ease forwards;font-weight:700}
  @keyframes chatfloat{0%{opacity:0;transform:translate(-50%,-80%) scale(.6)}18%{opacity:1;transform:translate(-50%,-110%) scale(1)}82%{opacity:1}100%{opacity:0;transform:translate(-50%,-150%)}}
  /* fireflies (night) */
  .firefly{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff3a0;
    box-shadow:0 0 6px 2px #ffe46e;pointer-events:none;animation:flit 4.2s ease-in-out forwards}
  @keyframes flit{0%{opacity:0;transform:translate(0,0)}20%{opacity:1}50%{opacity:.5;transform:translate(var(--dx),var(--dy))}80%{opacity:1}100%{opacity:0;transform:translate(calc(var(--dx)*-1),var(--dy))}}
  /* leaves (day) */
  .leaf{position:absolute;top:-6%;width:6px;height:6px;border-radius:60% 0 60% 0;pointer-events:none;animation:leaffall 5.2s linear forwards}
  @keyframes leaffall{0%{opacity:0;transform:translate(0,0) rotate(0)}10%{opacity:.95}100%{opacity:0;transform:translate(var(--fall),190px) rotate(420deg)}}
  /* shooting star (night, tappable) */
  .shootstar{position:absolute;left:-12%;width:34px;height:3px;border-radius:3px;cursor:pointer;z-index:5;
    background:linear-gradient(90deg,transparent,#fff);box-shadow:0 0 8px 2px #cfe0ff;animation:shoot 1.6s ease-in forwards}
  @keyframes shoot{0%{opacity:0;left:-12%;top:0}10%{opacity:1}100%{opacity:0;left:112%;top:60px}}
  .credits{margin:16px auto 8px;text-align:center;font-size:11px;line-height:1.6;
    color:#6c7a99;opacity:.7;max-width:330px;letter-spacing:.2px}
  .credits a{color:inherit;text-decoration:underline;font-weight:700}
  .credits a:hover{color:var(--blu);opacity:1}
  .resetlink{display:block;margin:2px auto 10px;background:none;border:none;cursor:pointer;
    font-family:var(--body);font-size:10px;color:#9aa6bd;opacity:.6;text-decoration:underline;
    letter-spacing:.3px;padding:6px 10px}
  .resetlink:hover{opacity:1;color:#8a93a8}
  .resetlink.danger{color:#d2453f;opacity:.9;font-size:12px;margin-top:4px}
  .resetlink.danger:hover{color:#b8332e;opacity:1}
  .gcard{margin:0 0 10px;text-align:left}
  .gsec{font-family:var(--px);font-size:9px;color:var(--blu);margin-bottom:7px;line-height:1.6}
  .gbody{font-size:13px;line-height:1.55;color:var(--ink);font-weight:600}
  .gbody b{color:#1f2f55}
  .gbody .gk{color:#3a8bf0;font-weight:800}
  .loginwrap{max-width:420px;margin:0 auto;padding:18px 4px 8px}
  .bq-planet{animation:bq-bob 4.5s ease-in-out infinite}
  @keyframes bq-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .oauth-g{background:#fff;color:#3c4043;border:2px solid #dadce0}
  .oauth-g:hover{background:#f7f8f8}
  .oauth-x{background:#111;color:#fff;border:2px solid #111}
  .oauth-x:hover{background:#000}
  .or-line{display:flex;align-items:center;gap:10px;margin:14px 2px;color:var(--ink2);font-size:12px}
  .or-line::before,.or-line::after{content:"";flex:1;height:2px;background:var(--line);border-radius:2px}
  .txtin{width:100%;box-sizing:border-box;padding:11px 12px;border:2px solid var(--line);border-radius:10px;
    font-family:var(--body);font-size:15px;font-weight:600;color:var(--ink);background:#fff;outline:none}
  .txtin:focus{border-color:var(--blu);box-shadow:0 0 0 3px #3a8bf033}
  .acctline{text-align:center;font-size:11px;color:#8693ad;margin:8px auto 0;opacity:.9}
  .acctline b{color:#5a6e9a}
  .linkbtn{background:none;border:none;cursor:pointer;font-family:var(--body);font-size:11px;
    color:var(--blu);text-decoration:underline;font-weight:700;padding:2px 4px}
  .lbtabs{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px}
  .lbtab{font-family:var(--body);font-weight:700;font-size:11px;cursor:pointer;padding:5px 9px;border-radius:8px;
    border:2px solid #d7def0;background:#fff;color:#5a6e9a}
  .lbtab.on{background:var(--blu);border-color:var(--blu);color:#fff}
  .lblist{display:flex;flex-direction:column;gap:4px;margin-top:6px;text-align:left}
  .lbrow{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:9px;background:#fff;border:2px solid #eef1f8}
  .lbrow.me{border-color:var(--sun);background:#fffbe9}
  .lbrank{font-family:var(--px);font-size:10px;width:30px;text-align:center;color:#8693ad}
  .lbname{flex:1;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbval{font-family:var(--px);font-size:11px;color:var(--blu)}
  .ticker{overflow:hidden;white-space:nowrap;margin:0 auto 12px;max-width:520px;border:2px solid var(--line);
    border-radius:10px;background:var(--cream);padding:6px 0;box-shadow:2px 2px 0 var(--shadow)}
  .tick-track{display:inline-block;white-space:nowrap;padding-left:100%;animation:tickscroll 34s linear infinite;
    font-size:12px;font-weight:600;color:var(--ink)}
  .ticker:hover .tick-track{animation-play-state:paused}
  .tick-item{padding:0 6px}.tick-dot{opacity:.4;padding:0 4px}
  @keyframes tickscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion:reduce){.tick-track{animation:none;padding-left:0}}
  .commbox{margin:4px 0 6px}
  .comm-tot{font-size:11px;color:var(--ink2);text-align:center;margin-bottom:6px;font-weight:600}
  .goal-label{font-size:13px;font-weight:800;text-align:center;margin:2px 0 1px;color:var(--ink)}
  .goal-sub{font-size:10px;text-align:center;margin-bottom:5px}
  .goal-bar{height:14px;border:2px solid var(--line);border-radius:8px;background:#fff;overflow:hidden;box-shadow:2px 2px 0 var(--shadow)}
  .goal-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),var(--cyan));transition:width .6s ease}

  .empty-slot{width:60px;height:60px;border:3px dashed #9fb4d6;border-radius:14px;
    display:flex;align-items:center;justify-content:center;color:#9fb4d6;font-size:22px;background:#ffffff77}

  /* generic pet tile */
  .pet-art{position:relative;flex-shrink:0}
  .pet-art .ring{position:absolute;inset:-3px;border-radius:14px;border:3px solid var(--line)}
  .pet-art .bgc{position:absolute;inset:0;border-radius:12px;opacity:.18}
  .pet-art img{position:relative;border-radius:12px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

  .roster-item{display:flex;gap:10px;align-items:center;background:var(--cream);
    border:3px solid var(--line);border-radius:14px;padding:8px;box-shadow:3px 3px 0 var(--shadow);
    cursor:pointer;margin-bottom:10px}
  .roster-item.inparty{background:#eaf4ff}
  .ri-name{font-family:var(--px);font-size:9px;margin-bottom:5px}
  .ri-meta{font-size:13px;color:var(--ink2);font-weight:700;display:flex;gap:6px;flex-wrap:wrap;align-items:center}

  .tag{font-family:var(--px);font-size:7px;border:2px solid var(--line);border-radius:8px;
    padding:2px 5px;display:inline-flex;align-items:center;gap:3px}
  .tier-pill{font-family:var(--px);font-size:7px;border-radius:8px;padding:3px 5px;color:#fff;border:2px solid var(--line)}

  /* xp/hp bars */
  .bar{position:relative;height:12px;background:#e7eef8;border:2px solid var(--line);border-radius:8px;overflow:hidden;margin-top:5px}
  .bar > i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .4s}
  .bar .lbl{position:absolute;right:5px;top:-2px;font-size:11px;font-weight:700;color:var(--ink)}

  /* zones */
  .zone{display:flex;gap:10px;align-items:center;border:3px solid var(--line);border-radius:14px;
    padding:10px;margin-bottom:10px;box-shadow:3px 3px 0 var(--shadow);cursor:pointer;background:var(--cream)}
  .zone.locked{filter:grayscale(.7);opacity:.6;cursor:not-allowed}
  .zone .emoji{font-size:26px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    border:3px solid var(--line);border-radius:12px;flex-shrink:0}
  .zone .zn{font-family:var(--px);font-size:9px;margin-bottom:5px}
  .zone .zd{font-size:13px;color:var(--ink2);font-weight:700}
  .pips{display:flex;gap:4px;margin-top:6px}
  .pip{width:11px;height:11px;border-radius:50%;background:#0000001f;border:2px solid var(--line)}
  .pip.on{background:var(--mint)}

  /* cooking */
  .bits-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:6px 0 12px}
  .bit{display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--px);font-size:8px}
  .bit .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);box-shadow:1px 1px 0 var(--shadow)}
  .color-pick{display:flex;flex-wrap:wrap;gap:16px 8px;justify-content:center;margin:8px 0 10px}
  .cpick{width:40px;height:40px;border-radius:12px;border:3px solid var(--line);cursor:pointer;
    box-shadow:2px 2px 0 var(--shadow);position:relative}
  .cpick.sel{outline:3px solid var(--ink);outline-offset:2px}
  .cpick .ct{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);font-family:var(--px);
    font-size:7px;background:var(--cream);border:2px solid var(--line);border-radius:6px;padding:1px 3px}
  .cpick .cn{position:absolute;top:-9px;right:-7px;font-family:var(--px);font-size:7px;color:#fff;
    background:var(--ink);border:2px solid var(--cream);border-radius:8px;padding:1px 4px;line-height:1;z-index:1}

  .pot-big{width:120px;height:96px;margin:6px auto 4px;position:relative}
  .pot-body{position:absolute;bottom:0;left:10px;right:10px;height:70px;background:#6b6e7e;
    border:4px solid var(--line);border-radius:10px 10px 22px 22px}
  .pot-lid{position:absolute;top:6px;left:0;right:0;height:16px;background:#8a8ea0;border:4px solid var(--line);border-radius:10px}
  .silho{position:relative;display:flex;justify-content:center;margin:10px 0}

function famElement(fam){ // element from first color of pair's pure family
  const c=BASE.findIndex(b=>b.name===fam.pair[0]); return ELEMENTS[c]||"Pale";
}

/* ---- art urls ---- */
let ASSET_KEY={}; // name -> png url (filled at boot, best effort)
function artT1(colorName,size){return `${API}/render.png?key=T1_${colorName.toUpperCase()}&size=${size||IMG}`;}
function artForm(fam,tier,formIdx,vibe,size){
  const nm = tier===2?fam.t2[formIdx] : tier===3?fam.t3[formIdx] : fam.t4;
  if(ASSET_KEY[nm]) return ASSET_KEY[nm].replace(/size=\d+/,"size="+(size||IMG));
  return `${API}/render.png?stage=${tier}&lineage=${fam.id}&form=${formIdx||0}&vibe=${vibe||0}&size=${size||IMG}`;
}
function petArtURL(p,size){
  if(p.tier===1) return artT1(p.colorName,size);
  return artForm(FAM_BY_ID[p.familyId], p.tier, p.formIdx, p.vibe, size);
}

/* ---- element type wheel: beats next 2 (mod 8) ---- */
function eleMult(a,d){const i=ELEMENTS.indexOf(a),j=ELEMENTS.indexOf(d);if(i<0||j<0)return 1;
  const k=(j-i+8)%8; if(k===1||k===2)return 1.35; if(k===6||k===7)return .75; return 1;}
function strongVs(el){const i=ELEMENTS.indexOf(el);return [ELEMENTS[(i+1)%8],ELEMENTS[(i+2)%8]];}
// element that is strong against `el` (good to bring): el's counter = i-1 or i-2
function counters(el){const i=ELEMENTS.indexOf(el);return ELEMENTS[(i+6)%8];}

/* ---- rng ---- */
function rint(n){return Math.floor(Math.random()*n);}
function pick(a){return a[rint(a.length)];}
function chance(p){return Math.random()<p;}

/* rewards (granted by the live arena on victory) */
function grantRewards(run){
  let px=12+run.lvl*3+rint(8);
  const bits={}; let n=2+rint(3);
  if(decorHas("flowers"))n+=1;
  if(decorHas("signpost"))n+=1;
  for(let i=0;i<n;i++){const c=pick([...FAM_BY_ID[pick(run.pool)].pair, pick(BASE).name]); bits[c]=(bits[c]||0)+1;}
  let xp=Math.round(run.lvl*12+24);
  let dust=2+rint(4)+Math.floor(run.lvl/3);
  if(decorHas("campfire")) px=Math.round(px*1.12);
  if(decorHas("balloon"))  xp=Math.round(xp*1.12);
  if(decorHas("tree"))     dust+=1;
  let stoneChance=0.35+run.lvl*0.01; if(decorHas("pool")) stoneChance+=0.06;
  const stone=chance(stoneChance)?rollStone(run):null;
  return {px,bits,xp,dust,stone};
}
function applyRewards(zone,run){
  const r=grantRewards(run);
  S.pixels+=r.px; S.dust+=r.dust;
  for(const c in r.bits)S.bits[c]=(S.bits[c]||0)+r.bits[c];
  S.party.forEach(iid=>{const p=S.pets.find(x=>x.iid===iid);if(p)gainXP(p,r.xp);});
  if(r.stone)S.stones.push(r.stone);
  const prog=zoneProgress(zone); if(prog<zone.stages)S.progress[zone.id]=prog+1;
  save(); return r;
}
function rollStone(zone){
  const tr=Math.random(); let tier="basic";
  if(tr>0.95)tier="gold"; else if(tr>0.82)tier="silver"; else if(tr>0.55)tier="bronze";
  return {id:"s"+Date.now()+rint(99999), kind:pick(STONE_ORDER), tier};
}

/* =================== COOKING =================== */
const COOK_MS=60*1000;
function fmtMMSS(ms){ const t=Math.max(0,Math.ceil(ms/1000)); return Math.floor(t/60)+":"+String(t%60).padStart(2,"0"); }
function cookRemainingMs(){ return S.cooking ? Math.max(0, S.cooking.dur-(Date.now()-S.cooking.start)) : 0; }
function cookReady(){ return !!S.cooking && cookRemainingMs()<=0; }
function startCook(colorName){
  if(S.cooking){ toast("The pot's already cooking! 🍲"); S.tab="cook"; render(); return; }
  if(S.pets.length>=MAX_PETS){toast("Storage full ("+MAX_PETS+"). Release a Blupet first.");return;}
  const role=S.cookRole||"any", premium=!!S.cookPremium;
  const bitCost=role==="any"?5:8, dustCost=premium?12:0;
  if(!colorName){toast("Pick a color first");return;}
  if((S.bits[colorName]||0)<bitCost){toast("Need "+bitCost+" "+colorName+" Bits");return;}
  if(premium && S.dust<dustCost){toast("Need 💠"+dustCost+" Stardust for a Choice recipe");return;}
  S.bits[colorName]-=bitCost; if(premium)S.dust-=dustCost;
  const lvl=premium?5:(chance(0.18)?3:1);
  const cookRoleSel = (role==="any") ? pick(Object.keys(ROLES)) : role;
  const vibe=rint(64);
  S.cooking={start:Date.now(), dur:COOK_MS, color:colorName, lvl, vibe, role:cookRoleSel};
  cookReadyFlag=false; sfx("cook"); save(); render(); startCookTicker();
  toast("🍲 Cooking… ready in 1 minute!");
}
function collectCook(){
  if(!cookReady())return;
  const c=S.cooking; S.cooking=null;
  const p=makePet(c.color,c.lvl,c.vibe,c.role);
  S.pets.push(p); markDex(p.familyId,1,0); if(S.party.length<3)S.party.push(p.iid);
  logActivity("cook", vibeName(p)+" "+c.color+" Blupet");
  questProgress("cook");
  save(); showCookReveal(p); render();
}
let cookTick=null, cookReadyFlag=false;
function startCookTicker(){
  if(cookTick){clearInterval(cookTick);cookTick=null;}
  if(!S.cooking)return;
  cookReadyFlag=cookReady();
  cookTick=setInterval(()=>{
    if(!S||!S.cooking){clearInterval(cookTick);cookTick=null;return;}
    const rem=cookRemainingMs();
    const a=document.getElementById("cookTimer"); const b=document.getElementById("cookTimerCook");
    if(a)a.textContent= rem>0?("🍲 "+fmtMMSS(rem)):"✨ Ready! Tap the pot";
    if(b)b.textContent= rem>0?("Cooking… "+fmtMMSS(rem)+" left"):"Ready to collect!";
    if(rem<=0 && !cookReadyFlag){ cookReadyFlag=true; sfx("reveal"); if(S.tab==="camp"||S.tab==="cook")render(); }
  },500);
}
function cook(colorName){ startCook(colorName); }

function tradeBits(){
  const from=S.tradeFrom, to=S.tradeTo;
  if(from===to){toast("Pick two different colors");return;}
  if((S.bits[from]||0)<3){toast("Need 3 "+from+" Bits");return;}

function meltBits(into){
  const c=S.tradeFrom;

  S.bits[c]-=3;
  if(into==="pixels"){S.pixels+=6; toast("+6 ✦ Pixels");}

const BREWS={
  stew: {icon:"🍲", name:"Stamina Stew",  bits:4, px:0,  dust:0,  desc:"Restores +4 Energy right now."},
  snack:{icon:"💪", name:"Power Snack",   bits:6, px:20, dust:0,  desc:"Next expedition: team +30% ATK."},
  tonic:{icon:"🛡️", name:"Iron Tonic",    bits:6, px:20, dust:0,  desc:"Next expedition: team +35% HP."},

function brew(kind){
  const r=BREWS[kind]; if(!r)return;
  const c=S.cookSel; if(!c){toast("Pick a color first");return;}
  if((S.bits[c]||0)<r.bits){toast("Need "+r.bits+" "+c+" Bits");return;}
  if(S.pixels<r.px){toast("Need ✦"+r.px+" Pixels");return;}
  if(S.dust<r.dust){toast("Need 💠"+r.dust+" Stardust");return;}
  if(kind==="stew" && S.energy>=S.maxEnergy){toast("Energy already full ⚡");return;}
  if(kind!=="stew" && S.prep[kind]){toast("Already brewed for your next run");return;}
  S.bits[c]-=r.bits; S.pixels-=r.px; S.dust-=r.dust;
  if(kind==="stew"){ S.energy=Math.min(S.maxEnergy,S.energy+4); toast("+4 Energy ⚡"); }
  else { S.prep[kind]=true; toast(r.name+" brewed — active next expedition!"); }
  sfx("cook"); save(); render();
}

function dailyKey(){ return njDayStr(new Date()); }

function showDailyReward(){

function claimDaily(px,bn,dust,streak){
  S.daily={last:dailyKey(), streak};
  S.pixels+=px;

  got.push(Object.keys(bits).map(c=>`${bits[c]}× ${c} Bit`).join(", "));

/* ===== daily quests (refresh each day) ===== */
const QUEST_POOL=[
  {type:"cook",        verb:"Cook",   noun:"Blupets",      targets:[3,4,5],    rw:{px:45,bits:2}},
  {type:"mobs",        verb:"Defeat", noun:"wild Blupets", targets:[25,35,50], rw:{px:55,dust:1}},
  {type:"expeditions", verb:"Win",    noun:"expeditions",  targets:[2,3,4],    rw:{px:50,dust:1}},
  {type:"evolve",      verb:"Evolve", noun:"Blupets",      targets:[1,2],      rw:{px:70,dust:3}},
  {type:"boss",        verb:"Defeat", noun:"bosses",       targets:[1,2],      rw:{px:60,dust:2}},
];
function genDailyQuests(){
  const pool=QUEST_POOL.slice(), out=[];
  for(let i=0;i<3 && pool.length;i++){
    const q=pool.splice(rint(pool.length),1)[0];
    out.push({type:q.type, target:pick(q.targets), prog:0, claimed:false});
  }
  return out;
}
function questDef(type){ return QUEST_POOL.find(q=>q.type===type); }
function questText(q){ const d=questDef(q.type); return `${d.verb} ${q.target} ${d.noun}`; }
function ensureQuests(){
  const today=dailyKey();
  if(!S.quests || S.quests.day!==today){ S.quests={day:today, list:genDailyQuests()}; save(); }
}
function questProgress(type,n){
  if(!S.quests||!S.quests.list)return; n=(n==null?1:n); let changed=false;
  for(const q of S.quests.list){ if(q.type===type && !q.claimed && q.prog<q.target){ q.prog=Math.min(q.target,q.prog+n); changed=true; } }
  if(changed)save();
}
function questClaimable(){ ensureQuests(); return (S.quests.list||[]).filter(q=>!q.claimed && q.prog>=q.target).length; }
function claimQuest(i){
  const q=S.quests&&S.quests.list&&S.quests.list[i]; if(!q||q.claimed||q.prog<q.target)return;
  const rw=questDef(q.type).rw; q.claimed=true;
  const got=[];
  if(rw.px){ S.pixels+=rw.px; got.push(`✦ ${rw.px} Pixels`); }
  if(rw.dust){ S.dust+=rw.dust; got.push(`💠 ${rw.dust} Stardust`); }
  if(rw.bits){ for(let k=0;k<rw.bits;k++){const c=pick(BASE).name; S.bits[c]=(S.bits[c]||0)+1;} got.push(`🎨 ${rw.bits} Bits`); }
  sfx("level"); save(); statbar(); toast("Quest complete! "+got.join(" · "));
  showQuests();
}
function showQuests(){
  ensureQuests(); closeOverlay();
  const rows=(S.quests.list||[]).map((q,i)=>{
    const pct=Math.min(100,Math.round(q.prog/q.target*100)), done=q.prog>=q.target;
    const rw=questDef(q.type).rw;
    const rwTxt=[rw.px?`✦${rw.px}`:"",rw.dust?`💠${rw.dust}`:"",rw.bits?`🎨${rw.bits}`:""].filter(Boolean).join(" ");
    return `<div class="card" style="margin:0 0 8px">
      <div class="ri-name" style="display:flex;justify-content:space-between;align-items:center">
        <span>${q.claimed?"✅ ":""}${esc(questText(q))}</span><span class="muted" style="font-size:11px">${rwTxt}</span></div>
      <div class="goal-bar" style="margin:6px 0 4px"><i style="width:${q.claimed?100:pct}%"></i></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="muted" style="font-size:11px">${Math.min(q.prog,q.target)}/${q.target}</span>
        ${q.claimed?`<span class="muted" style="font-size:11px">Claimed</span>`
          :done?`<button class="btn mint sm" data-act="claimquest" data-i="${i}">Claim</button>`
          :`<span class="muted" style="font-size:11px">In progress…</span>`}
      </div></div>`;
  }).join("");
  const ov=h(`<div class="overlay" data-dismiss="1"><div class="sheet">
    <h2 class="title center">📋 Daily Quests</h2>
    <p class="center muted" style="margin:2px 0 12px;font-size:12px">Fresh quests every day — come back tomorrow for more!</p>
    ${rows}
    <button class="btn ghost" data-act="closeoverlay" style="width:100%;margin-top:4px">Close</button>
  </div></div>`);
  document.body.appendChild(ov);
}

const STAGE_W=336, STAGE_H=188;
function zoneGround(el){const m={
  Growth:["#c4e89a","#a2da78"],Heat:["#ffd0a6","#ffb074"],Solar:["#ffe9a6","#ffd864"],
  Aqua:["#b0e8f0","#84d6e0"],Frost:["#d0e7ff","#a6ccf2"],Arcane:["#e2cef6","#c6a6ee"],
  Shadow:["#cccad6","#a6a4b6"],Pale:["#f4efe0","#e4dac4"]}; return m[el]||m.Growth;}
function nearest(u,arr){let best=null,bd=1e9;for(const t of arr){const d=(t.x-u.x)**2+(t.y-u.y)**2;if(d<bd){bd=d;best=t;}}return best;}
/* ===== status effects (element-flavored) ===== */
const STATUS_DEF={
  burn:  {dot:true, coef:0.15, dur:3.0, max:5, color:"#ff7a4a", ab:"🔥"},
  poison:{dot:true, coef:0.11, dur:4.0, max:6, color:"#74c85a", ab:"☠"},
  chill: {dur:2.4, max:4, color:"#7cc0ff", ab:"❄"},
  drench:{dur:2.4, max:3, color:"#54c9d9", ab:"💧"},
  dazzle:{dur:2.6, max:3, color:"#ffd23d", ab:"✦"},
  vuln:  {dur:3.0, max:4, color:"#c79bff", ab:"✷"},
  weaken:{dur:3.0, max:4, color:"#9aa0ad", ab:"▼"},
  sunder:{dur:3.0, max:4, color:"#e6dcc2", ab:"◇"},
  frozen:{dur:0.7, max:1, color:"#bfe6ff", ab:"✸"},
};
// each element's on-hit signature
const ELEMENT_FX={
  Heat:  {st:"burn"},                 // damage over time
  Growth:{st:"poison"},               // stacking DoT (ignores armor)
  Frost: {st:"chill", freezes:true},  // slow; heavy chill → freeze
  Aqua:  {st:"drench", aoe:0.5},      // slow + splash to a nearby foe
  Solar: {st:"dazzle"},               // attacker's hits start missing
  Arcane:{st:"vuln"},                 // takes extra damage
  Shadow:{st:"weaken", leech:0.25},   // lowers atk + lifesteals
  Pale:  {st:"sunder"},               // shreds armor
};
function applyStatus(t,key,srcAtk,powMul){
  if(!t.status)t.status={};
  powMul=powMul||1;
  const def=STATUS_DEF[key]; if(!def)return;
  if(key==="chill"){ const c=t.status.chill; if(c&&c.stacks>=3){ delete t.status.chill; applyStatus(t,"frozen",srcAtk,powMul); return; } }
  let e=t.status[key]; if(!e){ e={stacks:0,t:0,per:0}; t.status[key]=e; }
  e.stacks=Math.min(def.max,e.stacks+1); e.t=def.dur*powMul;
  if(def.dot)e.per=e.stacks*(srcAtk*def.coef);
}
function statusTick(u,dt){ if(!u.status)return 0; let dot=0;
  for(const k in u.status){ const e=u.status[k]; e.t-=dt; if(e.t<=0){delete u.status[k];continue;}
    const def=STATUS_DEF[k]; if(def&&def.dot)dot+=e.per*dt; }
  return dot;
}

function buildTrack(beat,voices){
  const notes=[]; let length=0;
  for(const v of voices){ let t=0; const dm=v.dm==null?0.9:v.dm;
    for(const [n,d] of v.seq){ const f=NOTE[n]; if(f)notes.push({t,f,dur:d*beat*dm,type:v.type,g:v.g}); t+=d; }
    if(t>length)length=t;
  }
  notes.sort((a,b)=>a.t-b.t);
  return {beat,length,notes};
}
function ensureAudio(){
  if(actx)return;
  try{const AC=window.AudioContext||window.webkitAudioContext; actx=new AC();
    master=actx.createGain(); master.gain.value=0.5; master.connect(actx.destination);}catch(e){actx=null;}
}
const TRACKS={};
function buildAllTracks(){
  TRACKS.main=buildTrack(0.16,[
    {seq:MAIN_LEAD,type:"square",g:0.055},
    {seq:MAIN_BASS,type:"triangle",g:0.05},
    {seq:MAIN_ARP,type:"square",g:0.028}]);
  TRACKS.battle=buildTrack(0.13,[
    {seq:BATTLE_LEAD,type:"square",g:0.055},
    {seq:BATTLE_BASS,type:"triangle",g:0.052},
    {seq:BATTLE_PERC,type:"square",g:0.035,dm:0.4}]);
}

function tone(f,start,dur,type,g){
  if(!f)return;
  const o=actx.createOscillator(), ga=actx.createGain();
  o.type=type; o.frequency.value=f;
  ga.gain.setValueAtTime(0,start);
  ga.gain.linearRampToValueAtTime(g,start+0.012);
  ga.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  o.connect(ga).connect(master); o.start(start); o.stop(start+dur+0.03);
}
let currentTrack="main", schedTimer=null, loopStart=0, noteIdx=0;
function scheduler(){
  if(!actx||!musicRunning)return;
  const tr=TRACKS[currentTrack], la=0.12;
  while(noteIdx<tr.notes.length){
    const n=tr.notes[noteIdx], when=loopStart+n.t*tr.beat;
    if(when<actx.currentTime+la){ tone(n.f, Math.max(when,actx.currentTime), n.dur, n.type, n.g); noteIdx++; }
    else break;
  }
  if(noteIdx>=tr.notes.length){ loopStart+=tr.length*tr.beat; noteIdx=0; }
}
function startMusic(){ ensureAudio(); if(!actx)return; if(actx.state==="suspended")actx.resume();
  if(musicRunning)return; musicRunning=true; loopStart=actx.currentTime+0.08; noteIdx=0;
  schedTimer=setInterval(scheduler,25); }
function stopMusic(){ musicRunning=false; if(schedTimer){clearInterval(schedTimer);schedTimer=null;} }
function playTrack(name){ if(!TRACKS[name]||currentTrack===name)return; currentTrack=name;
  if(actx&&musicRunning){ loopStart=actx.currentTime+0.05; noteIdx=0; } }

  if(S.music){startMusic();} else {stopMusic();} save(); statbar(); }

/* drag decorations around the camp */
let dragDecor=null;
document.addEventListener("pointerdown",e=>{
  const el=e.target.closest && e.target.closest(".decor"); if(!el)return;
  const dio=el.closest(".diorama"); if(!dio)return;
  e.preventDefault();
  dragDecor={el,key:el.dataset.k,dio,moved:false};
  el.classList.add("dragging");
  if(el.setPointerCapture)try{el.setPointerCapture(e.pointerId);}catch(_){}
});
document.addEventListener("pointermove",e=>{
  if(!dragDecor)return;
  const r=dragDecor.dio.getBoundingClientRect();
  let x=((e.clientX-r.left)/r.width)*100, y=((e.clientY-r.top)/r.height)*100;
  x=Math.max(3,Math.min(93,x)); y=Math.max(3,Math.min(90,y));
  dragDecor.el.style.left=x+"%"; dragDecor.el.style.top=y+"%";
  dragDecor.el.style.right="auto"; dragDecor.el.style.bottom="auto";
  dragDecor.pos={x:Math.round(x),y:Math.round(y)}; dragDecor.moved=true;
});
function endDecorDrag(){
  if(!dragDecor)return;
  if(dragDecor.moved && dragDecor.pos){ S.decorPos=S.decorPos||{}; S.decorPos[dragDecor.key]=dragDecor.pos; save(); }
  dragDecor.el.classList.remove("dragging"); dragDecor=null;
}
document.addEventListener("pointerup",endDecorDrag);
document.addEventListener("pointercancel",endDecorDrag);

/* short sound effects, share the music mute */
function sfx(name){
  if(!actx || S.music===false) return;
  if(actx.state==="suspended") actx.resume();
  const t=actx.currentTime;
  const b=(f,dt,dur,type,g)=>tone(f,t+dt,dur,type||"square",g==null?0.11:g);
  switch(name){
    case "cook":   b(523,0,.08); b(659,.07,.08); b(784,.15,.1); b(1047,.24,.16,"square",.12); break;
    case "reveal": b(784,0,.1); b(988,.11,.1); b(1319,.23,.26,"square",.13); break;
    case "charge": [196,247,294,349,392].forEach((f,i)=>b(f,i*0.09,.12,"triangle",.06)); break;
    case "evolve": [392,494,587,659,784,988,1175].forEach((f,i)=>b(f,i*0.06,.1,"square",.1));
                   b(1568,.5,.45,"triangle",.12); b(1976,.56,.45,"square",.06); break;
    case "equip":  b(880,0,.05,"square",.12); b(1320,.06,.1,"square",.1); break;
    case "victory":[523,659,784].forEach((f,i)=>b(f,i*0.11,.14)); b(1047,.34,.5,"triangle",.12);
                   b(1319,.4,.5,"square",.06); break;
    case "defeat": [392,349,294,247].forEach((f,i)=>b(f,i*0.15,.2,"triangle",.1)); break;
    case "hit":    b(180+Math.random()*140,0,.05,"square",.05); break;
    case "level":  [659,784,1047].forEach((f,i)=>b(f,i*0.06,.11)); break;
  }
}
/* floating damage number popped over a battle fighter */
function floatDmg(fk,dmg,crit,sup){
  const box=$("battleBox"); if(!box||dmg==null)return;
  const el=box.querySelector('[data-fk="'+fk+'"]'); if(!el)return;
  const r=el.getBoundingClientRect();
  const d=document.createElement("div");
  d.className="dmgpop"+(crit?" crit":sup?" sup":"");
  d.textContent=dmg+(crit?"!":"");
  d.style.left=(r.left+r.width/2)+"px"; d.style.top=(r.top+6)+"px";
  document.body.appendChild(d); setTimeout(()=>d.remove(),760);
  el.classList.add("hurt"); setTimeout(()=>el.classList.remove("hurt"),230);
}
/* burst of sparkles inside a container */
function sparkle(root){
  const c=document.createElement("div"); c.className="spark-layer"; root.appendChild(c);
  for(let i=0;i<16;i++){const s=document.createElement("div"); s.className="spark"; s.textContent="✦";
    const a=Math.random()*6.283, dist=55+Math.random()*120;
    s.style.setProperty("--dx",(Math.cos(a)*dist).toFixed(0)+"px");
    s.style.setProperty("--dy",(Math.sin(a)*dist).toFixed(0)+"px");
    s.style.animationDelay=(Math.random()*0.18).toFixed(2)+"s"; c.appendChild(s);}
  setTimeout(()=>c.remove(),1500);
}
/* pet a Blupet: element-flavored chirp + heart pop + squish */
function petSound(el){
  if(!actx || S.music===false) return;
  if(actx.state==="suspended") actx.resume();
  const t=actx.currentTime;
  const seqs={
    Heat:  [[330,0,.09,"square"],[440,.08,.13,"square"]],
    Solar: [[660,0,.08,"square"],[988,.07,.13,"square"]],
    Growth:[[392,0,.10,"triangle"],[523,.09,.14,"triangle"]],
    Aqua:  [[587,0,.09,"triangle"],[440,.08,.14,"triangle"]],
    Frost: [[784,0,.07,"square"],[1175,.06,.12,"square"]],
    Arcane:[[523,0,.07,"square"],[659,.06,.07,"square"],[784,.12,.13,"square"]],
    Shadow:[[196,0,.12,"triangle"],[262,.10,.15,"triangle"]],
    Pale:  [[698,0,.09,"triangle"],[880,.08,.14,"triangle"]],
  };

function petPet(iid){
  const p=S.pets.find(x=>x.iid===iid); if(!p)return;
  const el=famElement(FAM_BY_ID[p.familyId]);
  const before=bondLevel(p); p.bond=(p.bond||0)+1; const after=bondLevel(p); save();
  petSound(el);
  const node=document.querySelector('[data-petslot="'+iid+'"]');
  if(!node)return;
  node.classList.remove("petsquish"); void node.offsetWidth; node.classList.add("petsquish");
  const r=node.getBoundingClientRect();
  const levelUp=after>before;
  const n=levelUp?5:(1+Math.floor(Math.random()*2));
  for(let i=0;i<n;i++){
    const d=document.createElement("div"); d.className="heartpop";
    d.textContent=Math.random()<0.25?"✨":"❤";
    d.style.color=ELECOLOR[el]||"#ff7a6b";
    d.style.left=(r.left+r.width/2+(Math.random()*24-12))+"px";
    d.style.top=(r.top+6)+"px";
    d.style.animationDelay=(i*0.07)+"s";
    document.body.appendChild(d); setTimeout(()=>d.remove(),1100+i*90);
  }
  if(levelUp){ sfx("level"); toast(petDisplayName(p)+" loves you! ♥ Bond Lv "+after); }
}

/* day/night cycle from the player's local clock */
function applyTimeTheme(){
  const h=new Date().getHours();
  let phase = (h>=5&&h<7)?"dawn" : (h>=7&&h<17)?"day" : (h>=17&&h<20)?"dusk" : "night";
  const T={
    dawn: {sky1:"#ffd6b0",sky2:"#ffe9d6",sky3:"#fff3e0", dsky1:"#ffc59a",dsky2:"#ffe2c6",ground:"#bfe89a", sun:"#ffb35c",glow:"#ffcf8e", cloud:"#fff",cop:.85},
    day:  {sky1:"#bfe2ff",sky2:"#eaf6ff",sky3:"#fef6e9", dsky1:"#aee0ff",dsky2:"#cdeeff",ground:"#bfe89a", sun:"#ffc928",glow:"#ffe48a", cloud:"#fff",cop:.8},
    dusk: {sky1:"#ff9e7a",sky2:"#ffc29a",sky3:"#f7d2b8", dsky1:"#ff9d76",dsky2:"#ffc7a0",ground:"#a9cf86", sun:"#ff7e5f",glow:"#ffb088", cloud:"#ffe6d8",cop:.7},
    night:{sky1:"#1b2550",sky2:"#2a3566",sky3:"#39406f", dsky1:"#1e2a55",dsky2:"#34417c",ground:"#52704a", sun:"#e8eefc",glow:"#cdd8ff", cloud:"#aab6da",cop:.5},
  };
  const c=T[phase], r=document.documentElement.style;
  r.setProperty("--sky1",c.sky1); r.setProperty("--sky2",c.sky2); r.setProperty("--sky3",c.sky3);
  r.setProperty("--dsky1",c.dsky1); r.setProperty("--dsky2",c.dsky2); r.setProperty("--dground",c.ground);
  r.setProperty("--sun",c.sun); r.setProperty("--sun-glow",c.glow);
  r.setProperty("--cloud",c.cloud); r.setProperty("--cloud-op",c.cop);
  const b=document.body.classList;
  b.toggle("night",phase==="night"); b.toggle("dusk",phase==="dusk"); b.toggle("dawn",phase==="dawn");
}

function goalClaimedHas(wk){ return !!(S.goalClaimed && S.goalClaimed[wk]); }
function grantGoalReward(wk,last){
  if(!S.goalClaimed)S.goalClaimed={}; S.goalClaimed[wk]=true;
  S.pixels+=GOAL.reward.px; S.dust+=GOAL.reward.dust; save(); statbar(); showGoalCelebration(last);
}
function maybeClaimGoal(prog){ // current week, using local contribution (used by the leaderboard panel)
  const wk=periodKeys().week;
  if(isGuest||!authUser||goalClaimedHas(wk))return;
  if(prog<GOAL.target)return;
  const mine=(S.lb&&S.lb.weekStats&&S.lb.weekStats[GOAL.stat])||0;
  if(mine<=0)return;
  grantGoalReward(wk,false);
}

async function checkGoal(){
  if(isGuest||!sbc||!authUser||!S.username)return;
  const wk=periodKeys().week;
  // current week — contribution from local weekly bucket
  if(!goalClaimedHas(wk)){
    try{ const r=await sbc.rpc("weekly_total",{stat:GOAL.stat, wk});
      if((r.data||0)>=GOAL.target){ const mine=(S.lb&&S.lb.weekStats&&S.lb.weekStats[GOAL.stat])||0; if(mine>0)grantGoalReward(wk,false); }
    }catch(e){}
  }
  // previous week — pay stragglers; contribution read from the DB (local bucket has reset)
  const lastWk=addDaysKey(wk,-7);
  if(!goalClaimedHas(lastWk)){
    try{ const r=await sbc.rpc("weekly_total",{stat:GOAL.stat, wk:lastWk});
      if((r.data||0)>=GOAL.target){
        const o=await sbc.from("lb_weekly").select(GOAL.stat).eq("user_id",authUser.id).eq("period",lastWk).maybeSingle();
        const mine=(o&&o.data)?(o.data[GOAL.stat]||0):0;
        if(mine>0)grantGoalReward(lastWk,true);
      }
    }catch(e){}
  }
}
async function loadCommunity(ov){
  const box=ov.querySelector("#commBox"); if(!box)return;
  if(!sbc){ box.innerHTML=""; return; }
  try{
    let tot=null; try{ const r=await sbc.from("community_totals").select("*").maybeSingle(); tot=r.data; }catch(e){}
    const wk=periodKeys().week; let prog=0;
    try{ const r=await sbc.rpc("weekly_total",{stat:GOAL.stat, wk}); prog=r.data||0; }catch(e){}
    const pct=Math.min(100,Math.round(prog/GOAL.target*100)), reached=prog>=GOAL.target;
    if(!ov.querySelector("#commBox"))return;
    box.innerHTML=`${tot?`<div class="comm-tot">👥 ${tot.trainers} trainers · 🍳 ${tot.pets} cooked · ⚔️ ${tot.mobs} mobs · 🌟 ${tot.evolutions} evolutions</div>`:''}
      <div class="goal-label">${GOAL.emoji} Weekly Goal: ${prog.toLocaleString()} / ${GOAL.target.toLocaleString()} ${reached?'✅ reached!':''}</div>
      <div class="goal-sub muted">${GOAL.label}</div>
      <div class="goal-bar"><i style="width:${pct}%"></i></div>`;
    if(reached)maybeClaimGoal(prog);
  }catch(e){ box.innerHTML=""; }
}

function promptUsername(){
  return new Promise(resolve=>{
    const ov=h(`<div class="overlay"><div class="battle">
      <h2 class="title center">Pick a display name</h2>
      <p class="center muted" style="margin:0 0 12px">This is how you'll appear on the leaderboard. 3–16 letters, numbers, or underscores.</p>
      <input id="unameIn" class="txtin" maxlength="16" placeholder="e.g. BluMaster" autocomplete="off">
      <div id="unameMsg" class="muted" style="font-size:12px;margin:8px 0;min-height:16px"></div>
      <button class="btn mint" id="unameGo" style="width:100%;margin-bottom:8px">Save name</button>
      <button class="resetlink" id="unameSkip" style="margin:0 auto">Maybe later</button>
    </div></div>`);
    document.body.appendChild(ov);
    const inp=ov.querySelector("#unameIn"), msg=ov.querySelector("#unameMsg"), go=ov.querySelector("#unameGo");
    ov.querySelector("#unameSkip").onclick=()=>{ ov.remove(); resolve(); };
    go.onclick=async()=>{
      const name=(inp.value||"").trim();
      if(!/^[A-Za-z0-9_]{3,16}$/.test(name)){ msg.textContent="3–16 letters, numbers, or underscores."; return; }
      if(!sbc){ msg.textContent="Offline — try again later."; return; }
      go.disabled=true; msg.textContent="Saving…";
      try{
        const st=S.stats||{};
        const {error}=await sbc.from("leaderboard").upsert({user_id:authUser.id, username:name,
          mobs:st.mobs||0,bosses:st.bosses||0,pets:st.pets||0,evolutions:st.evolutions||0,
          expeditions:st.expeditions||0, highest_zone:highestZoneCleared(), highest_level:highestPetLevel(),
          updated_at:new Date().toISOString()});
        if(error){ msg.textContent=(/duplicate|unique|23505/i.test(error.message+(error.code||"")))?"That name's taken — try another.":("Error: "+error.message); go.disabled=false; return; }
        S.username=name; save(); ov.remove(); resolve();
      }catch(e){ msg.textContent="Network error — try again."; go.disabled=false; }
    };
    if(inp.focus)setTimeout(()=>inp.focus(),50);
  });
}

async function doOAuth(provider){
  if(!sbc){ toast("Sign-in is offline right now"); return; }
  const opts={redirectTo:location.origin};
  if(provider==="x") opts.scopes="users.read tweet.read offline.access";
  try{ const {error}=await sbc.auth.signInWithOAuth({provider, options:opts});
    if(error)toast("Sign-in error: "+error.message);
  }catch(e){ toast("Network error — try again, or play as guest."); }
}
async function doMagicLink(){
  const el=$("emailIn"), msg=$("loginMsg"); if(!el)return;
  const email=(el.value||"").trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ if(msg)msg.textContent="Please enter a valid email address."; return; }
  if(!sbc){ if(msg)msg.textContent="Sign-in is offline right now — try guest mode."; return; }
  if(msg)msg.textContent="Sending…";
  try{
    const {error}=await sbc.auth.signInWithOtp({email, options:{emailRedirectTo:location.origin}});
    if(error){ if(msg)msg.textContent="Couldn't send link: "+error.message; return; }
    if(msg)msg.innerHTML="✅ Check your email for a sign-in link! Click it and you'll land back here, signed in.";
  }catch(e){ if(msg)msg.textContent="Network error — try again, or play as guest."; }
}
const LB_VIEWS=[["today","Today"],["yesterday","Yesterday"],["week","This Week"],["lastweek","Last Week"],["alltime","All-Time"]];
const LB_COUNT_STATS=[["mobs","Mobs"],["bosses","Bosses"],["pets","Pets"],["evolutions","Evolves"],["expeditions","Runs"]];
const LB_ALL_STATS=[...LB_COUNT_STATS,["highest_zone","Zone"],["highest_level","Level"]];
function lbStatsFor(view){ return view==="alltime"?LB_ALL_STATS:LB_COUNT_STATS; }
function lbTarget(view){ // {table, period|null}
  const k=periodKeys();
  if(view==="today")    return {table:"lb_daily",  period:k.day};
  if(view==="yesterday")return {table:"lb_daily",  period:addDaysKey(k.day,-1)};
  if(view==="week")     return {table:"lb_weekly", period:k.week};
  if(view==="lastweek") return {table:"lb_weekly", period:addDaysKey(k.week,-7)};
  return {table:"leaderboard", period:null};
}
function lbResetNote(view){
  if(view==="today")return "Resets at midnight (Eastern).";
  if(view==="week")return "Resets Sunday midnight (Eastern).";
  if(view==="yesterday")return "Final results for yesterday.";
  if(view==="lastweek")return "Final results for last week.";
  return "All-time totals.";
}
function showLeaderboard(){
  syncLeaderboard();
  const needName = !isGuest && authUser && !S.username;
  if(!lbStatsFor(lbView).some(([k])=>k===lbStat))lbStat="mobs";
  const ov=h(`<div class="overlay" data-dismiss="1"><div class="battle">
    <div class="center" style="font-size:30px">🏆</div>
    <h2 class="title center">Leaderboard</h2>
    <div id="commBox" class="commbox"></div>
    <div id="lbViews" class="lbtabs"></div>
    <div id="lbTabs" class="lbtabs" style="margin-top:6px"></div>
    <div id="lbNote" class="muted center" style="font-size:10px;margin-top:6px"></div>
    <div id="lbBody" class="muted center" style="margin-top:8px;min-height:60px">Loading…</div>
    ${needName?`<button class="btn mint" data-act="setname" style="width:100%;margin-top:8px">Choose a name to join</button>`:""}
    ${isGuest?`<p class="muted center" style="font-size:11px;margin-top:8px">Playing as guest — <button class="linkbtn" data-act="gotologin">sign in</button> to appear here.</p>`:""}
    <button class="btn ghost" data-act="closeoverlay" style="width:100%;margin-top:10px">Close</button>
  </div></div>`);
  document.body.appendChild(ov);
  renderLbViews(ov); renderLbTabs(ov); loadLb(ov); loadCommunity(ov);
}
function renderLbViews(ov){
  const t=ov.querySelector("#lbViews"); if(!t)return;
  t.innerHTML=LB_VIEWS.map(([k,lb])=>`<button class="lbtab ${lbView===k?'on':''}" data-lv="${k}">${lb}</button>`).join("");
  t.querySelectorAll(".lbtab").forEach(b=>b.onclick=()=>{ lbView=b.dataset.lv;
    if(!lbStatsFor(lbView).some(([k])=>k===lbStat))lbStat="mobs";
    renderLbViews(ov); renderLbTabs(ov); loadLb(ov); });
}
function renderLbTabs(ov){
  const t=ov.querySelector("#lbTabs"); if(!t)return;
  t.innerHTML=lbStatsFor(lbView).map(([k,lb])=>`<button class="lbtab ${lbStat===k?'on':''}" data-lb="${k}">${lb}</button>`).join("");
  t.querySelectorAll(".lbtab").forEach(b=>b.onclick=()=>{ lbStat=b.dataset.lb; renderLbTabs(ov); loadLb(ov); });
  const note=ov.querySelector("#lbNote"); if(note)note.textContent=lbResetNote(lbView);
}
async function loadLb(ov){
  const body=ov.querySelector("#lbBody"); if(!body)return; body.textContent="Loading…";
  if(!sbc){ body.textContent="Leaderboard is offline right now."; return; }
  const {table,period}=lbTarget(lbView); const stat=lbStat;
  try{
    let q=sbc.from(table).select("user_id,username,"+stat).order(stat,{ascending:false}).limit(50);
    if(period)q=q.eq("period",period);
    const {data,error}=await q;
    if(error){ body.textContent="Couldn't load: "+error.message; return; }
    if(!data||!data.length){ body.innerHTML=`<div style="padding:10px 0">No scores yet — be the first!</div>`; return; }
    const myId=authUser&&authUser.id;
    const rows=data.map((r,i)=>{
      const me=myId&&r.user_id===myId;
      const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
      return `<div class="lbrow${me?' me':''}"><span class="lbrank">${medal}</span>
        <span class="lbname">${esc(r.username)}</span><span class="lbval">${r[stat]||0}</span></div>`;
    }).join("");
    let mine="";
    const inTop = myId && data.some(r=>r.user_id===myId);
    if(myId && S.username && !inTop){
      // fetch own value + rank
      try{
        let oq=sbc.from(table).select(stat).eq("user_id",myId); if(period)oq=oq.eq("period",period);
        const {data:od}=await oq.maybeSingle();
        const myVal=od?(od[stat]||0):0;
        if(myVal>0){
          let cq=sbc.from(table).select("*",{count:"exact",head:true}).gt(stat,myVal); if(period)cq=cq.eq("period",period);
          const {count}=await cq;
          mine=`<div class="lbrow me" style="margin-top:8px"><span class="lbrank">${(count||0)+1}</span>
            <span class="lbname">${esc(S.username)} (you)</span><span class="lbval">${myVal}</span></div>`;
        } else {
          mine=`<div class="muted center" style="margin-top:8px;font-size:11px">You're not on this board yet — play to climb!</div>`;
        }
      }catch(e){}
    }
    body.innerHTML=`<div class="lblist">${rows}</div>${mine}`;
  }catch(e){ body.textContent="Network error loading the board."; }
}
async function bootAuth(){
  initSupa();
  if(sbc){
    try{ sbc.auth.onAuthStateChange((ev,sess)=>{ if(sess&&sess.user&&!authUser){ authUser=sess.user; enterLoggedIn(); } }); }catch(e){}
    let session=null;
    try{ const {data}=await sbc.auth.getSession(); session=data&&data.session; }catch(e){}
    if(session&&session.user){ authUser=session.user; await enterLoggedIn(); return; }
  }
  showLoginScreen();
}

bootAuth();
